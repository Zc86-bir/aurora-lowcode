# Aurora Low-Code Platform — Production Docker Compose
# Services: Aurora + PostgreSQL + Redis + MinIO
# Usage: docker compose -f docker-compose.prod.yml up -d

services:
  # ===========================
  # Aurora Application
  # ===========================
  aurora:
    build:
      context: .
      dockerfile: Dockerfile.prod
    container_name: aurora-app
    restart: unless-stopped
    ports:
      - "${SERVER_PORT:-8080}:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_NAME: ${DATABASE_NAME:-aurora}
      DATABASE_USER: ${DATABASE_USER:-aurora}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:?DATABASE_PASSWORD is required}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      SERVER_PORT: 8080
      HIKARI_MAX_POOL: 20
      HIKARI_MIN_IDLE: 5
      # Observability: OpenTelemetry → Prometheus + Tempo
      MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: health,info,prometheus,metrics
      MANAGEMENT_METRICS_EXPORT_PROMETHEUS_ENABLED: true
      MANAGEMENT_TRACING_ENABLED: true
      MANAGEMENT_TRACING_SAMPLING_PROBABILITY: 1.0
      MANAGEMENT_ZIPKIN_TRACING_ENDPOINT: http://tempo:9411/api/v2/spans
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - aurora-net
    deploy:
      resources:
        limits:
          cpus: "4.0"
          memory: 2G
        reservations:
          cpus: "1.0"
          memory: 512M

  # ===========================
  # PostgreSQL
  # ===========================
  postgres:
    image: postgres:17-alpine
    container_name: aurora-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DATABASE_NAME:-aurora}
      POSTGRES_USER: ${DATABASE_USER:-aurora}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:?DATABASE_PASSWORD is required}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER:-aurora} -d ${DATABASE_NAME:-aurora}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - aurora-net
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1G

  # ===========================
  # Redis
  # ===========================
  redis:
    image: redis:7-alpine
    container_name: aurora-redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - aurora-net
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M

  # ===========================
  # Object Storage: Alibaba Cloud OSS (external service)
  # MinIO has been replaced by OSS. No local object storage container needed.
  # ===========================

  # ===========================
  # Prometheus (Metrics Collection)
  # ===========================
  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: aurora-prometheus
    restart: unless-stopped
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./deploy/observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
      - '--web.enable-admin-api'
    networks:
      - aurora-net
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G

  # ===========================
  # Grafana (Dashboards)
  # ===========================
  grafana:
    image: grafana/grafana:11.4.0
    container_name: aurora-grafana
    restart: unless-stopped
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:?GRAFANA_PASSWORD is required}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_INSTALL_PLUGINS: grafana-piechart-panel
    volumes:
      - grafana-data:/var/lib/grafana
      - ./deploy/observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./deploy/observability/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      prometheus:
        condition: service_started
      tempo:
        condition: service_started
    networks:
      - aurora-net
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M

  # ===========================
  # Tempo (Distributed Tracing)
  # ===========================
  tempo:
    image: grafana/tempo:2.6.1
    container_name: aurora-tempo
    restart: unless-stopped
    ports:
      - "${TEMPO_GRPC_PORT:-4317}:4317"    # OTLP gRPC
      - "${TEMPO_HTTP_PORT:-4318}:4318"    # OTLP HTTP
      - "${TEMPO_ZIPKIN_PORT:-9411}:9411"  # Zipkin compatible
      - "${TEMPO_QUERY_PORT:-3200}:3200"   # Tempo query API
    volumes:
      - ./deploy/observability/tempo-config.yaml:/etc/tempo/tempo-config.yaml:ro
      - tempo-data:/tmp/tempo
    command:
      - '-config.file=/etc/tempo/tempo-config.yaml'
    networks:
      - aurora-net
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M

  # ===========================
  # Loki (Log Aggregation)
  # ===========================
  loki:
    image: grafana/loki:3.4.2
    container_name: aurora-loki
    restart: unless-stopped
    ports:
      - "${LOKI_PORT:-3100}:3100"
    volumes:
      - ./deploy/observability/loki-config.yaml:/etc/loki/local-config.yaml:ro
      - loki-data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3100/ready"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - aurora-net
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G

  # ===========================
  # Promtail (Log Shipper)
  # ===========================
  promtail:
    image: grafana/promtail:3.4.2
    container_name: aurora-promtail
    restart: unless-stopped
    volumes:
      - ./deploy/observability/promtail-config.yaml:/etc/promtail/config.yml:ro
      - /var/log:/var/log:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - promtail-positions:/run/promtail
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      loki:
        condition: service_healthy
    networks:
      - aurora-net
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M

# ===========================
# Networks
# ===========================
networks:
  aurora-net:
    driver: bridge
    name: aurora-net

# ===========================
# Volumes
# ===========================
volumes:
  postgres-data:
  redis-data:
  prometheus-data:
  grafana-data:
  tempo-data:
    driver: local
  loki-data:
    driver: local
  promtail-positions:
    driver: local
