<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Password Reset</title>
</head>
<body style="font-family: Arial, sans-serif; max-width: 600px; margin: 0 auto; padding: 20px;">
    <div style="background: #3b82f6; color: white; padding: 20px; border-radius: 8px 8px 0 0;">
        <h1 style="margin: 0;">Password Reset Request</h1>
    </div>
    <div style="background: #f9fafb; padding: 20px; border: 1px solid #e5e7eb;">
        <p>Hello <strong th:text="${username}">User</strong>,</p>
        <p>You requested a password reset. Click the link below to set a new password:</p>
        <p style="text-align: center; margin: 20px 0;">
            <a th:href="${resetUrl}" style="background: #3b82f6; color: white; padding: 10px 20px; text-decoration: none; border-radius: 4px;">
                Reset Password
            </a>
        </p>
        <p style="color: #6b7280; font-size: 0.875rem;">
            This link expires in 24 hours. If you didn't request this, please ignore this email.
        </p>
    </div>
    <div style="text-align: center; padding: 10px; color: #9ca3af; font-size: 0.75rem;">
        Aurora LowCode Platform &copy; 2026
    </div>
</body>
</html>
