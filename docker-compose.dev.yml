# Aurora Low-Code Platform - Development Environment
# git clone → code . → docker compose up -d → mvn spring-boot:run
services:

  postgres:
    image: postgres:17.2-alpine
    container_name: aurora-postgres
    environment:
      POSTGRES_USER: aurora
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aurora_dev_password}
      POSTGRES_DB: aurora
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./src/main/resources/db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aurora"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - aurora-net

  redis:
    image: redis:7.4.1-alpine
    container_name: aurora-redis
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-aurora_redis_password}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-aurora_redis_password}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M
    networks:
      - aurora-net

  # Optional: LocalStack for testing AWS-compatible services locally
  localstack:
    image: localstack/localstack:3.8.1
    container_name: aurora-localstack
    profiles:
      - test
    environment:
      SERVICES: s3,ses,sqs
      DEFAULT_REGION: us-east-1
    ports:
      - "4566:4566"
    volumes:
      - localstack_data:/var/lib/localstack
    networks:
      - aurora-net

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  localstack_data:
    driver: local

networks:
  aurora-net:
    driver: bridge
