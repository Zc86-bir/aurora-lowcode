name: CD

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ===========================
  # Build, Test & Scan
  # ===========================
  build:
    name: Build & Publish Image
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Run tests
        run: mvn -B test -DskipITs -Djacoco.skip=true

      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.prod
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }}
          format: spdx-json
          output-file: sbom.json

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ steps.meta.outputs.version }}
          path: sbom.json
          retention-days: 90

  # ===========================
  # Package Helm Chart
  # ===========================
  helm:
    name: Package & Publish Helm Chart
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Helm
        uses: azure/setup-helm@v4
        with:
          version: 'latest'

      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Package Helm chart
        run: |
          helm package deploy/helm/aurora \
            --version ${{ needs.build.outputs.version }} \
            --app-version ${{ needs.build.outputs.version }} \
            --destination ./charts

      - name: Push Helm chart to OCI registry
        run: |
          helm push ./charts/aurora-${{ needs.build.outputs.version }}.tgz \
            oci://${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/charts

  # ===========================
  # Deploy to K8s (optional)
  # ===========================
  deploy:
    name: Deploy to Kubernetes
    runs-on: ubuntu-latest
    needs: [build, helm]
    if: github.ref_type == 'tag'
    environment:
      name: production
      url: https://aurora.example.com
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Helm
        uses: azure/setup-helm@v4
        with:
          version: 'latest'

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > $HOME/.kube/config
        shell: bash

      - name: Deploy with Helm
        # NOTE: --set passes secrets inline. For production, use External Secrets Operator,
        # Sealed Secrets, or SOPS instead of passing secrets via --set.
        run: |
          helm upgrade --install aurora ./deploy/helm/aurora \
            --namespace aurora \
            --create-namespace \
            --set image.repository=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }} \
            --set image.tag=${{ needs.build.outputs.version }} \
            --set jwtSecret=${{ secrets.JWT_SECRET }} \
            --set database.password=${{ secrets.DATABASE_PASSWORD }} \
            --set redis.password=${{ secrets.REDIS_PASSWORD }} \
            --set ingress.enabled=true \
            --set ingress.hosts[0].host=aurora.example.com \
            --set ingress.tls[0].secretName=aurora-tls \
            --set ingress.tls[0].hosts[0]=aurora.example.com \
            --wait --timeout 300s

      - name: Verify deployment
        run: |
          kubectl rollout status deployment/aurora -n aurora --timeout=300s
          kubectl get pods -n aurora
          kubectl get svc -n aurora
