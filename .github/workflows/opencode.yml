# OpenCode GitHub Integration
#
# Official OpenCode Agent integration for GitHub.
# Triggered by commenting `/oc` or `/opencode` on issues or PR review comments.
#
# Required secrets:
#   - OPENAI_API_KEY: API key for OpenCode agent (OpenAI-compatible endpoint for kimi-k2.6)
#
# Optional:
#   - share: Whether to share OpenCode session (default true for public repos)
#   - github_token: Custom GitHub token (defaults to OpenCode App token)
#
# Setup:
#   1. Install GitHub App: https://github.com/apps/opencode-agent
#   2. Add OPENAI_API_KEY to repository secrets
#   3. Comment `/oc <your request>` on any issue or PR

name: opencode

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  opencode:
    if: |
      contains(github.event.comment.body, '/oc') ||
      contains(github.event.comment.body, '/opencode')
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
      pull-requests: write
      issues: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Run OpenCode
        uses: anomalyco/opencode/github@latest
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        with:
          model: opencode-go/kimi-k2.6
          # agent: build
          # share: true
          # prompt: ""
          # github_token: ${{ secrets.GITHUB_TOKEN }}
