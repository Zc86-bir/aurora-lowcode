name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  security-events: write

jobs:
  # ===========================
  # Build & Test
  # ===========================
  build:
    name: Build & Test (Java ${{ matrix.java }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        java: ['25']
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java }}
          distribution: 'temurin'
          cache: maven

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Build with Maven
        run: mvn -B clean compile -DskipTests -DskipSpringdoc=true

      - name: Run Unit Tests (without coverage)
        run: mvn -B test -DskipITs -Djacoco.skip=true -DskipSpringdoc=true

      - name: Run Integration Tests
        run: mvn -B verify -DskipUTs -Djacoco.skip=true -DskipSpringdoc=true -Dspotbugs.skip=true -Ddependency-check.skip=true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-java-${{ matrix.java }}
          path: |
            target/surefire-reports/
            target/failsafe-reports/
          retention-days: 7

  # ===========================
  # Code Quality: SpotBugs
  # ===========================
  spotbugs:
    name: SpotBugs Static Analysis
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Run SpotBugs
        run: mvn -B compile com.github.spotbugs:spotbugs-maven-plugin:spotbugs -DskipTests -DskipSpringdoc=true

      - name: Upload SpotBugs report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: spotbugs-report
          path: target/spotbugsXml.xml
          retention-days: 7

  # ===========================
  # Security: OWASP Dependency Check
  # ===========================
  security:
    name: OWASP Dependency Check
    runs-on: ubuntu-latest
    needs: build
    env:
      NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Cache OWASP dependency-check data
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository/org/owasp/dependency-check-data
          key: ${{ runner.os }}-owasp-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-owasp-

      # ============================================================
      # DEBUG: Verify NVD API Key and GitHub Context
      # ============================================================
      - name: '[DEBUG] GitHub Actions Context'
        run: |
          echo "::group::GitHub Context"
          echo "event_name=${{ github.event_name }}"
          echo "ref=${{ github.ref }}"
          echo "actor=${{ github.actor }}"
          echo "repository=${{ github.repository }}"
          echo "run_id=${{ github.run_id }}"
          echo "::endgroup::"

      - name: '[DEBUG] Check Repository Secrets'
        run: |
          echo "::group::Secrets Diagnostic"
          # Check env var (set from secrets.NVD_API_KEY at job level)
          if [ -z "$NVD_API_KEY" ]; then
            echo "NVD_API_KEY: NOT AVAILABLE"
            echo "Action: Go to Settings > Secrets and variables > Actions"
            echo "Action: Add repository secret 'NVD_API_KEY' with your NVD API key"
          else
            echo "NVD_API_KEY: AVAILABLE (length ${#NVD_API_KEY})"
          fi
          echo "---"
          echo "Job-level env check:"
          env | grep -i nvd || echo "No NVD_* env vars found"
          echo "::endgroup::"

      - name: Verify NVD API Key availability
        run: |
          echo "::group::NVD API Key Diagnostic"
          # Check if env var is set (from secrets.NVD_API_KEY at job level)
          if [ -z "$NVD_API_KEY" ]; then
            echo "::error::NVD_API_KEY is EMPTY or NOT SET."
            echo "::error::"
            echo "::error::Please add the secret to your repository:"
            echo "::error::  1. Go to https://github.com/${{ github.repository }}/settings/secrets/actions"
            echo "::error::  2. Click 'New repository secret'"
            echo "::error::  3. Name:  NVD_API_KEY"
            echo "::error::  4. Value: Your NVD API key (get one at https://nvd.nist.gov/developers/request-an-api-key)"
            echo "::error::"
            echo "::error::Alternatively, if you don't have an NVD API key yet, you can:"
            echo "::error::  - Temporarily disable the security job by commenting it out in ci.yml"
            echo "::error::  - Or run with -DnvdApiKey= to use the public endpoint (very slow, may timeout)"
            echo "::endgroup::"
            exit 1
          fi

          KEY_LEN=${#NVD_API_KEY}
          if [ "$KEY_LEN" -lt 30 ]; then
            echo "::warning::NVD_API_KEY is present but looks suspicious (length: $KEY_LEN). Expected ~36 characters."
            echo "::warning::Please verify the secret value is correct."
          else
            echo "::notice::NVD_API_KEY is present and looks valid (length: $KEY_LEN)."
          fi
          echo "::endgroup::"

      - name: Run OWASP Dependency Check
        run: |
          echo "::group::OWASP Dependency Check"
          echo "Running OWASP with NVD API key (length: ${#NVD_API_KEY})..."
          mvn -B org.owasp:dependency-check-maven:check \
            -DskipTests -DfailBuildOnCVSS=7 -DskipSpringdoc=true \
            -DnvdApiKey="$NVD_API_KEY"
          echo "::endgroup::"

      - name: Upload dependency check report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: owasp-dependency-check
          path: target/dependency-check-report.html
          retention-days: 7

  # ===========================
  # Code Coverage: JaCoCo
  # ===========================
  coverage:
    name: JaCoCo Code Coverage (>=10%)
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Run tests with coverage
        run: mvn -B verify -DskipITs -DskipSpringdoc=true
        # JaCoCo check goal is bound to 'verify' phase in pom.xml
        # Current thresholds: INSTRUCTION >= 0.10, BRANCH >= 0.10
        # TODO: Increase to >= 0.80 after adding more unit tests

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-coverage-report
          path: target/site/jacoco/
          retention-days: 7

  # ===========================
  # Build Docker Image
  # ===========================
  docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [build, spotbugs, security, coverage]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.prod
          push: false
          load: true
          tags: aurora-lowcode:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@0.29.0
        with:
          image-ref: aurora-lowcode:ci
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy scan results
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          image: aurora-lowcode:ci
          format: spdx-json
          output-file: sbom.json

      - name: Upload SBOM
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.json
          retention-days: 30
