name: Test Secret
on:
  workflow_dispatch:  # 手动触发
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check NVD_API_KEY
        run: |
          if [ -z "${{ secrets.NVD_API_KEY }}" ]; then
            echo "❌ NVD_API_KEY is NOT set"
            exit 1
          else
            echo "✅ NVD_API_KEY is set (length: ${#NVD_API_KEY})"
          fi
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
