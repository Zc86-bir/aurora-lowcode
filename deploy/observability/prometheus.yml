global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Aurora Application Metrics
  - job_name: aurora
    metrics_path: /actuator/prometheus
    scrape_interval: 10s
    static_configs:
      - targets: ['aurora:8080']
        labels:
          application: aurora-lowcode
          environment: prod

  # Prometheus self-monitoring
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']
        labels:
          application: prometheus

  # Grafana metrics
  - job_name: grafana
    static_configs:
      - targets: ['grafana:3000']
        labels:
          application: grafana
