apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    uid: prometheus
    url: http://prometheus:9090
    access: proxy
    isDefault: true
    editable: true
    jsonData:
      timeInterval: 15s
      httpMethod: POST

  - name: Tempo
    type: tempo
    uid: tempo
    url: http://tempo:3200
    access: proxy
    editable: true
    jsonData:
      httpMethod: GET
      nodeGraph:
        enabled: true
      tracesToMetrics:
        datasourceUid: prometheus
        spanStartTimeShift: -1h
        spanEndTimeShift: 1h
        tags:
          - key: service.name
            value: aurora-lowcode
      # Traces -> Logs correlation
      tracesToLogs:
        datasourceUid: loki
        spanStartTimeShift: -1h
        spanEndTimeShift: 1h
        filterByTraceID: true
        filterBySpanID: true
        tags:
          - traceId
          - spanId
        mappedTags:
          - key: traceId
            value: traceId
          - key: spanId
            value: spanId
        searchRegexp: ""
        spanStartTimeShift: ""
        spanEndTimeShift: ""

  - name: Loki
    type: loki
    uid: loki
    url: http://loki:3100
    access: proxy
    editable: true
    jsonData:
      derivedFields:
        # Logs -> Traces correlation: extract traceId from log lines
        - datasourceUid: tempo
          matcherRegex: "traceId=(?P<traceId>[a-f0-9]+)"
          name: TraceID
          url: "$${__value.raw}"
          matcherType: regex

  - name: Jaeger
    type: jaeger
    uid: jaeger
    url: http://tempo:3200
    access: proxy
    editable: true
