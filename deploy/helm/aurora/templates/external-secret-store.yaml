{{- if .Values.externalSecrets.enabled }}
# External Secrets Operator — SecretStore
# Connects to your secrets backend (Vault, AWS Secrets Manager, etc.)
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: {{ include "aurora.fullname" . }}
  labels:
    {{- include "aurora.labels" . | nindent 4 }}
spec:
  {{- if eq .Values.externalSecrets.backend "vault" }}
  provider:
    vault:
      server: "{{ .Values.externalSecrets.vault.server }}"
      path: "{{ .Values.externalSecrets.vault.path }}"
      namespace: "{{ .Values.externalSecrets.vault.namespace }}"
      auth:
        kubernetes:
          mountPath: "{{ .Values.externalSecrets.vault.authMountPath }}"
          role: "{{ .Values.externalSecrets.vault.role }}"
          serviceAccountRef:
            name: {{ include "aurora.serviceAccountName" . }}
  {{- else if eq .Values.externalSecrets.backend "aws" }}
  provider:
    aws:
      service: SecretsManager
      region: {{ .Values.externalSecrets.aws.region }}
      auth:
        jwt:
          serviceAccountRef:
            name: {{ include "aurora.serviceAccountName" . }}
  {{- else if eq .Values.externalSecrets.backend "gcp" }}
  provider:
    gcpsm:
      projectID: {{ .Values.externalSecrets.gcp.projectId }}
      auth:
        workloadIdentity:
          serviceAccountRef:
            name: {{ include "aurora.serviceAccountName" . }}
  {{- end }}
{{- end }}
