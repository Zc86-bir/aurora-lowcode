{{- if .Values.externalSecrets.enabled }}
# External Secret — Dynamic key injection without pod restart
# ESO watches this resource and syncs secrets from the backend to a K8s Secret
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ include "aurora.fullname" . }}-llm-keys
  labels:
    {{- include "aurora.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ .Values.externalSecrets.refreshInterval }}
  secretStoreRef:
    name: {{ include "aurora.fullname" . }}
    kind: SecretStore
  target:
    name: {{ include "aurora.fullname" . }}
    creationPolicy: Owner
    template:
      type: Opaque
  dataFrom:
    - extract:
        key: {{ .Values.externalSecrets.secretPrefix }}/aurora/llm

    # Individual key mappings for LLM providers
    - extract:
        key: {{ .Values.externalSecrets.secretPrefix }}/aurora/database
    - extract:
        key: {{ .Values.externalSecrets.secretPrefix }}/aurora/redis
    - extract:
        key: {{ .Values.externalSecrets.secretPrefix }}/aurora/jwt
{{- end }}
