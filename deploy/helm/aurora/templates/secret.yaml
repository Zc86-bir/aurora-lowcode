{{- if or (not .Values.database.existingSecret) (not .Values.redis.existingSecret) .Values.jwtSecret .Values.llm.anthropicApiKey .Values.llm.openaiApiKey .Values.backup.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "aurora.fullname" . }}
  labels:
    {{- include "aurora.labels" . | nindent 4 }}
type: Opaque
stringData:
  # Database credentials (omit when using existingSecret)
  {{- if not .Values.database.existingSecret }}
  username: {{ required "database.username is required" .Values.database.username | quote }}
  password: {{ required "database.password is required" .Values.database.password | quote }}
  {{- end }}

  # Redis password (omit when using existingSecret)
  {{- if not .Values.redis.existingSecret }}
  redis-password: {{ required "redis.password is required" .Values.redis.password | quote }}
  {{- end }}

  # JWT Secret (must be provided)
  {{- if .Values.jwtSecret }}
  jwt-secret: {{ .Values.jwtSecret | quote }}
  {{- end }}

  # LLM API Keys (for AI routing — primary + fallback)
  {{- if .Values.llm.anthropicApiKey }}
  anthropic-api-key: {{ .Values.llm.anthropicApiKey | quote }}
  {{- end }}
  {{- if .Values.llm.openaiApiKey }}
  openai-api-key: {{ .Values.llm.openaiApiKey | quote }}
  {{- end }}

  # MinIO credentials (for backup CronJob)
  {{- if .Values.backup.enabled }}
  minio-access-key: {{ .Values.minio.accessKey | default "minioadmin" | quote }}
  minio-secret-key: {{ required "minio.secretKey is required for backups" .Values.minio.secretKey | quote }}
  {{- end }}
{{- end }}
