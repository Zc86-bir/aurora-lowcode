# Nginx Production Configuration for Aurora Frontend
#
# This config provides production-grade caching for Vite 6 build artifacts.
# Place this in your Nginx config or use as a sidecar container.
#
# Cache Strategy:
# - /index.html → NO cache (ensures instant updates on deploy)
# - /assets/**  → IMMUTABLE cache (365 days, assets have content hash)
# - /static/**  → LONG cache (1 day, non-hashed static files)
# - /favicon.ico → LONG cache (1 day)

upstream aurora_backend {
    server 127.0.0.1:8080;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name _;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'self' https:;" always;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/woff2;

    # Brotli compression (if compiled in)
    # brotli on;
    # brotli_comp_level 6;
    # brotli_types text/plain text/css application/javascript application/json image/svg+xml font/woff2;

    root /usr/share/nginx/html;
    index index.html;

    # ===========================
    # Cache Strategy
    # ===========================

    # HTML entry point — NO cache, ensures instant updates on deploy
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate, max-age=0";
        add_header Pragma "no-cache";
        add_header Expires "0";
        add_header X-Content-Type-Options "nosniff";
        try_files $uri $uri/ /index.html;
    }

    # Service worker — NO cache (critical for PWA updates)
    location = /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate, max-age=0";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }
    location = /service-worker.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate, max-age=0";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # Static assets with hash fingerprint — IMMUTABLE cache (365 days)
    # Vite 6 generates: /assets/index-D8gR1.js, /assets/index-Ck2sL.css
    location /assets/ {
        expires 365d;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        # Security headers (must be repeated since add_header overrides server block)
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        access_log off;
    }

    # Static files without hash — SHORT cache (1 day)
    location /static/ {
        expires 1d;
        add_header Cache-Control "public, max-age=86400" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    # Favicon — SHORT cache (1 day)
    location = /favicon.ico {
        expires 1d;
        add_header Cache-Control "public, max-age=86400" always;
        add_header X-Content-Type-Options "nosniff" always;
        access_log off;
        log_not_found off;
    }

    # Fonts — LONG cache (30 days)
    location ~* \.(woff|woff2|ttf|otf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000" always;
        add_header X-Content-Type-Options "nosniff" always;
        access_log off;
    }

    # Images — MEDIUM cache (7 days)
    location ~* \.(png|jpg|jpeg|gif|ico|svg|webp|avif)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800" always;
        add_header X-Content-Type-Options "nosniff" always;
        access_log off;
    }

    # ===========================
    # SPA Fallback
    # ===========================
    location / {
        try_files $uri $uri/ /index.html;

        # Default cache for SPA routes
        add_header Cache-Control "no-cache";
    }

    # ===========================
    # API Proxy (backend)
    # ===========================
    location /api/ {
        proxy_pass http://aurora_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Tenant-Id $http_x_tenant_id;
        proxy_set_header X-User-Id $http_x_user_id;

        # WebSocket support (for real-time features)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Timeouts
        proxy_connect_timeout 30s;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;

        # No caching for API responses
        add_header Cache-Control "no-store";
    }

    # ===========================
    # Health Check
    # ===========================
    location /healthz {
        access_log off;
        return 200 'OK';
        add_header Content-Type text/plain;
    }

    # ===========================
    # Logging
    # ===========================
    log_format aurora '$remote_addr - $remote_user [$time_local] '
                      '"$request" $status $body_bytes_sent '
                      '"$http_referer" "$http_user_agent" '
                      'rt=$request_time';

    access_log /var/log/nginx/access.log aurora;
    error_log /var/log/nginx/error.log warn;

    # Client body size limit
    client_max_body_size 50m;
}
