skill_id: jeecg-system
name: Jeecg System Configuration Manager
description: Generate and manage JeecgBoot system configuration with hot-reload and tenant isolation
version: 1.0.0
category: infrastructure
executor: ai-pipeline
author: aurora-team
created_at: 2026-05-04T00:00:00Z
updated_at: 2026-05-04T00:00:00Z
deprecated: false
aliases:
  - config_manager
  - skill_config_manager
jeecg_compat: true

tags:
  - jeecg
  - system
  - config
  - hot_reload
  - tenant_config
  - dict
  - permission

input_schema:
  description:
    type: string
    required: true
    description: Natural language description of the configuration
  config_scope:
    type: string
    required: true
    enum: [tenant, system, feature, integration, dict, permission]
  tenant_id:
    type: uuid
    required: false
    description: Tenant ID (required for tenant scope)
  config_data:
    type: object
    required: false
    description: Configuration key-value pairs
  override_existing:
    type: boolean
    required: false
    default: false

output_schema:
  config_id:
    type: uuid
    required: true
  config_key:
    type: string
    required: true
  config_value:
    type: string
    required: true
  config_type:
    type: string
    required: true
  scope:
    type: string
    required: true
  version:
    type: number
    required: true
  hot_reload_enabled:
    type: boolean
    required: true
  checksum:
    type: string
    required: true

business_rules:
  - "Config key must be unique within scope"
  - "System config requires admin role"
  - "Tenant config scoped to requesting tenant"
  - "Dictionary config must have valid key-value pairs"
  - "Permission config must follow JeecgBoot permission format"
  - "Hot-reload compatible with running instances"

security_rules:
  - "No secrets in plain text (use encrypted values)"
  - "System config requires admin role check"
  - "Tenant config isolated by tenant_id"
  - "Audit log entry created for all config changes"
  - "Encrypted values for sensitive configurations"
