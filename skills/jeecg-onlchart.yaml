skill_id: jeecg-onlchart
name: Jeecg Online Chart Builder
description: Generate online chart configurations compatible with JeecgBoot charting system
version: 1.0.0
category: chart_design
executor: ai-pipeline
author: aurora-team
created_at: 2026-05-04T00:00:00Z
updated_at: 2026-05-04T00:00:00Z
deprecated: false
aliases:
  - chart_generator
jeecg_compat: true

tags:
  - jeecg
  - onlchart
  - chart
  - visualization
  - echarts
  - graph

input_schema:
  description:
    type: string
    required: true
    description: Natural language description of the chart requirements
  tenant_id:
    type: uuid
    required: true
  chart_type:
    type: string
    required: true
    enum: [line, bar, pie, scatter, area, radar, gauge, funnel, map]
  data_source:
    type: string
    required: true
    description: SQL query or API endpoint for chart data
  dimensions:
    type: array
    required: false
    description: Dimension fields (x-axis, categories)
  metrics:
    type: array
    required: false
    description: Metric fields (y-axis, values, aggregations)
  style_options:
    type: object
    required: false
    properties:
      title: { type: string }
      show_legend: { type: boolean, default: true }
      show_tooltip: { type: boolean, default: true }
      color_scheme: { type: string, default: default }
      animation: { type: boolean, default: true }

output_schema:
  chart_config_id:
    type: uuid
    required: true
  chart_json:
    type: object
    required: true
    description: ECharts compatible configuration JSON
  data_query:
    type: string
    required: true
  dimension_mapping:
    type: array
    required: true
  metric_mapping:
    type: array
    required: true
  checksum:
    type: string
    required: true

business_rules:
  - "Chart type must be supported by ECharts 5.x"
  - "Dimension and metric count must be within chart limits"
  - "Data query must return compatible result format"
  - "Chart must include tenant_id filter"
  - "Aggregation functions must be valid SQL"

security_rules:
  - "Data query validated against SQL injection"
  - "Chart data scoped to tenant permissions"
  - "No sensitive data in chart configuration"
  - "Audit log entry created for chart generation"
