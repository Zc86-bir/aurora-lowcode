skill_id: skill_report_builder
name: Report Builder
description: Generate report metadata, data source bindings, and column definitions from natural language
version: 1.0.0
category: code_generation
executor: ai-pipeline
author: aurora-team
created_at: 2026-05-03T00:00:00Z
updated_at: 2026-05-03T00:00:00Z
deprecated: false

tags:
  - report
  - builder
  - analytics
  - data_binding

input_schema:
  description:
    type: string
    required: true
    description: Natural language description of the report
  data_source_type:
    type: string
    required: true
    enum: [sql, api, nosql, csv]
  columns:
    type: array
    required: false
    description: Explicit column definitions (optional, can be inferred)
  filters:
    type: array
    required: false
    description: Report filter definitions
  grouping:
    type: array
    required: false
    description: Group by fields

output_schema:
  report_id:
    type: uuid
    required: true
  name:
    type: string
    required: true
  data_source:
    type: object
    required: true
  columns:
    type: array
    required: true
  filters:
    type: array
    required: true
  aggregation:
    type: object
    required: false
  checksum:
    type: string
    required: true

business_rules:
  - "Report name must be unique within tenant"
  - "Data source must exist and be accessible"
  - "Column types must match data source schema"
  - "Aggregations must be valid for column types"

security_rules:
  - "SQL data sources must use parameterized queries"
  - "No raw table access; only through approved views"
  - "Row-level permissions applied to all queries"
