skill_id: skill_form_generator
name: Form Generator
description: Generate form metadata, layout, and validation rules from natural language descriptions
version: 1.0.0
category: code_generation
executor: ai-pipeline
author: aurora-team
created_at: 2026-05-03T00:00:00Z
updated_at: 2026-05-03T00:00:00Z
deprecated: false

tags:
  - form
  - generator
  - frontend
  - validation

input_schema:
  description:
    type: string
    required: true
    description: Natural language description of the form
  tenant_id:
    type: uuid
    required: true
  fields:
    type: array
    required: false
    description: Explicit field definitions (optional, can be inferred from description)
  layout_type:
    type: string
    required: false
    default: vertical
    enum: [vertical, horizontal, grid, wizard]
    constraints:
      enum_values: [vertical, horizontal, grid, wizard]

output_schema:
  form_id:
    type: uuid
    required: true
  name:
    type: string
    required: true
  schema:
    type: object
    required: true
  layout:
    type: object
    required: true
  validation_rules:
    type: array
    required: true
  checksum:
    type: string
    required: true

business_rules:
  - "Form name must be unique within tenant"
  - "All required fields must have validation rules"
  - "Layout must be compatible with target form type"
  - "Generated schema must pass JSON Schema Draft 2020-12"

security_rules:
  - "No SQL injection patterns in generated field names"
  - "No XSS vectors in generated labels or descriptions"
  - "Field permissions default to tenant-wide read"
