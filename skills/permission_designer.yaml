skill_id: skill_permission_designer
name: Permission Designer
description: Generate RBAC + ABAC permission rules from natural language policy descriptions
version: 1.0.0
category: security
executor: ai-pipeline
author: aurora-team
created_at: 2026-05-03T00:00:00Z
updated_at: 2026-05-03T00:00:00Z
deprecated: false

tags:
  - permission
  - rbac
  - abac
  - security

input_schema:
  description:
    type: string
    required: true
    description: Natural language description of the permission policy
  resource_type:
    type: string
    required: true
    description: The resource the permission applies to
  roles:
    type: array
    required: false
    description: Roles involved in the policy
  conditions:
    type: array
    required: false
    description: ABAC conditions for fine-grained control

output_schema:
  permission_id:
    type: uuid
    required: true
  name:
    type: string
    required: true
  rules:
    type: array
    required: true
  role_assignments:
    type: array
    required: true
  abac_policies:
    type: array
    required: false
  field_rules:
    type: array
    required: false
  checksum:
    type: string
    required: true

business_rules:
  - "Permission name must be unique within tenant"
  - "At least one role must be assigned"
  - "No contradictory rules (DENY overrides ALLOW)"
  - "Field rules must not conflict with resource rules"

security_rules:
  - "Default deny for all unspecified operations"
  - "No wildcards in critical resource permissions"
  - "Admin permissions must have justification"
  - "Data access scoped to minimum necessary"
